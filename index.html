<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Google Tag Manager -->
    <script>
      (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
      new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
      'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-MZ8QVQXN');
    </script>
    <!-- End Google Tag Manager -->
    
    <!-- Default title + base meta. Per-page SEO (description, canonical, Open
         Graph, Twitter, JSON-LD) is owned by react-helmet-async and baked into
         each route's static HTML at prerender time. Keeping og/twitter tags out
         of this shell prevents the homepage card from overriding subpage cards. -->
    <title>exotiq — The AI command center for exotic car rental operations</title>
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="language" content="English" />
    
    <!-- Favicon and Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preload the LCP hero image so it paints fast (CSS background images aren't auto-discovered) -->
    <link rel="preload" as="image" href="/images/hero/koenigsegg-regera.jpg" fetchpriority="high" />
    <meta name="theme-color" content="#000000" />
    <meta name="msapplication-TileColor" content="#000000" />
    
    <!-- Pixel 9 Pro Chrome Fix — deferred so it no longer blocks first paint
         (executes in order, before DOMContentLoaded and the app module). -->
    <script src="/pixel-chrome-fix.js" defer></script>
    
    <!-- Performance & Compatibility Systems (deferred, order preserved) -->
    <script src="/browser-compatibility.js" defer></script>
    <script src="/performance-optimizer.js" defer></script>
    <script src="/error-recovery.js" defer></script>
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Fonts — loaded non-render-blocking (swap media on load) with a noscript
         fallback. display=swap avoids invisible text during load. -->
    <link rel="stylesheet" media="print" onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
    </noscript>
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "exotiq",
      "url": "https://exotiq.ai/",
      "logo": "https://exotiq.ai/brand/exotiq-lockup-horizontal-white.svg",
      "description": "The AI command center for exotic car rental operations",
      "sameAs": [
        "https://www.linkedin.com/company/exotiq-ai",
        "https://twitter.com/Exotiqai"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@exotiq.ai",
        "contactType": "customer service"
      }
    }
    </script>
  </head>
  <body> 
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MZ8QVQXN"
        height="0" width="0" style="display:none;visibility:hidden"></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script> 
  </body>
</html>
