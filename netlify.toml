[build]
  publish = "dist"
  # Production stays on the plain SPA build until the prerender pipeline is
  # validated on a preview/branch deploy (see context overrides below).
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# --- Prerender validation contexts -----------------------------------------
# Deploy previews (PRs) and branch deploys run the full static-prerender
# pipeline so we can confirm crawlable HTML on a live URL before switching
# production. Chromium is installed for Playwright; if the preview logs report
# missing shared libraries, change to `--with-deps chromium`.
[context.deploy-preview]
  command = "npx playwright install chromium && npm run build:prerendered"

[context.deploy-preview.environment]
  NODE_VERSION = "20"

[context.branch-deploy]
  command = "npx playwright install chromium && npm run build:prerendered"

[context.branch-deploy.environment]
  NODE_VERSION = "20"

# To activate in production after validation, change the [build] command above
# to: npx playwright install chromium && npm run build:prerendered

# Crawler/bot prerendering: Netlify Prerender extension (site settings), not this file.

# Redirects - SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # Don't apply to files that exist
  force = false

# Headers for AI/Bot detection and caching
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Cache control for HTML (allow revalidation for fresh content)
    Cache-Control = "public, max-age=0, must-revalidate"
    
    # Help AI models identify content
    X-Robots-Tag = "index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"

# Static assets - aggressive caching
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/javascript"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "text/css"

# Images - long cache
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "image/jpeg"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "image/webp"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "image/png"

# Fonts - long cache
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "font/woff2"
