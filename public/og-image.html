<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exotiq · Open Graph Image</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Manrope', system-ui, sans-serif;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        /* Faint aperture grid + gulf glow, on-brand and unobtrusive */
        .grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(110,193,228,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(110,193,228,0.06) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(circle at 50% 42%, #000 0%, transparent 70%);
            -webkit-mask-image: radial-gradient(circle at 50% 42%, #000 0%, transparent 70%);
        }
        .content {
            display: flex; flex-direction: column; align-items: center;
            gap: 36px; z-index: 2; text-align: center;
        }
        .mark { width: 200px; height: 200px; display: block; }
        .wordmark {
            font-weight: 800; font-size: 132px; line-height: 0.9;
            letter-spacing: -0.05em; color: #FFFFFF;
        }
        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px; letter-spacing: 0.28em; text-transform: uppercase;
            color: #6EC1E4;
        }
        .footer {
            position: absolute; bottom: 48px; left: 0; right: 0;
            display: flex; justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px; letter-spacing: 0.22em; text-transform: uppercase;
            color: #C0C0C0;
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="content">
        <svg class="mark" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="120" cy="120" r="96" fill="none" stroke="#FFFFFF" stroke-width="20" />
            <rect x="56" y="68" width="116" height="18" fill="#FFFFFF" />
            <rect x="56" y="111" width="86" height="18" fill="#FFFFFF" />
            <rect x="56" y="154" width="116" height="18" fill="#FFFFFF" />
            <circle cx="186" cy="54" r="10" fill="#6EC1E4" />
        </svg>
        <div class="wordmark">exotiq</div>
        <div class="tagline">The AI Command Center</div>
    </div>
    <div class="footer">AI Fleet Management for Exotic &amp; Rental Car Operators</div>
</body>
</html>
